<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Habits"/>
  <meta name="theme-color" content="#0f0f0e"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Daily Habits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #0f0f0e;
      --bg2:       #181816;
      --bg3:       #222220;
      --gold:      #c9a96e;
      --gold-dim:  #8a6e3e;
      --gold-glow: rgba(201,169,110,.15);
      --text:      #ede8df;
      --text-dim:  #7a746a;
      --text-mid:  #b0a898;
      --green:     #6a9e6f;
      --red:       #c46b5a;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    header {
      padding: calc(var(--safe-top) + 18px) 24px 0;
      flex-shrink: 0;
    }

    .header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .date-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -.01em;
      line-height: 1;
      color: var(--text);
    }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--gold-glow);
      border: 1px solid var(--gold-dim);
      border-radius: 20px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 500;
      color: var(--gold);
    }

    .streak-badge .flame { font-size: 14px; }

    /* ── TABS ── */
    .tab-bar {
      display: flex;
      margin: 18px 24px 0;
      background: var(--bg2);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 8px 0;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .01em;
    }

    .tab.active {
      background: var(--bg3);
      color: var(--gold);
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px calc(var(--safe-bot) + 16px);
      -webkit-overflow-scrolling: touch;
    }

    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── TODAY VIEW ── */
    .progress-ring-wrap {
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--bg2);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .ring-svg { flex-shrink: 0; }

    .ring-bg  { fill: none; stroke: var(--bg3); stroke-width: 5; }
    .ring-arc {
      fill: none; stroke: var(--gold); stroke-width: 5;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1);
    }

    .ring-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      fill: var(--text);
      dominant-baseline: middle;
      text-anchor: middle;
    }

    .ring-sub {
      font-size: 9px;
      fill: var(--text-dim);
      dominant-baseline: middle;
      text-anchor: middle;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .04em;
    }

    .progress-meta { flex: 1; }
    .progress-meta .label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .progress-meta .fraction {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .progress-meta .fraction span {
      font-size: 14px;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
    }

    .progress-meta .pct {
      font-size: 12px;
      color: var(--gold);
      margin-top: 2px;
    }

    /* ── HABIT LIST ── */
    .habits-list { display: flex; flex-direction: column; gap: 10px; }

    .habit-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg2);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background .15s, transform .1s;
      border: 1px solid transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .habit-row:active { transform: scale(0.98); }

    .habit-row.done {
      background: var(--bg2);
      border-color: var(--gold-dim);
    }

    .habit-icon {
      font-size: 22px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg3);
      border-radius: 10px;
      flex-shrink: 0;
      transition: background .2s;
    }

    .habit-row.done .habit-icon { background: var(--gold-glow); }

    .habit-info { flex: 1; min-width: 0; }

    .habit-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      transition: color .2s;
    }

    .habit-row.done .habit-name { color: var(--text-mid); }

    .habit-streak-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    .habit-streak-label.active { color: var(--gold); }

    .check-box {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid var(--bg3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
      background: var(--bg3);
    }

    .habit-row.done .check-box {
      background: var(--gold);
      border-color: var(--gold);
    }

    .check-box svg { opacity: 0; transform: scale(.5); transition: all .2s; }
    .habit-row.done .check-box svg { opacity: 1; transform: scale(1); }

    /* ── NOTES ── */
    .notes-section { margin-top: 20px; }

    .notes-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .notes-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color .2s;
      min-height: 70px;
    }

    .notes-input:focus { border-color: var(--gold-dim); }
    .notes-input::placeholder { color: var(--text-dim); }

    /* ── WEEKLY DASHBOARD ── */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .week-nav .wlabel {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .week-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--bg3);
      background: var(--bg2);
      color: var(--text-mid);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .week-btn:active { background: var(--bg3); }

    /* Summary strip */
    .week-summary {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 22px;
    }

    .day-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }

    .day-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .day-label.today { color: var(--gold); }

    .day-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      position: relative;
      overflow: hidden;
    }

    .day-dot .fill {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--gold);
      opacity: .25;
      transition: height .4s;
    }

    .day-dot.perfect .fill { opacity: .6; }
    .day-dot span { position: relative; z-index: 1; }

    /* Habit grid */
    .grid-header {
      display: grid;
      grid-template-columns: 110px repeat(7, 1fr);
      gap: 0;
      margin-bottom: 4px;
    }

    .gh-cell {
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: .04em;
      padding-bottom: 4px;
    }

    .gh-cell.today { color: var(--gold); }

    .habit-grid-row {
      display: grid;
      grid-template-columns: 110px repeat(7, 1fr);
      gap: 0;
      padding: 4px 0;
      border-bottom: 1px solid var(--bg3);
      align-items: center;
    }

    .habit-grid-row:last-child { border-bottom: none; }

    .habit-grid-name {
      font-size: 12px;
      color: var(--text-mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .habit-grid-name .ico { font-size: 13px; }

    .grid-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .grid-pip {
      width: 18px; height: 18px;
      border-radius: 5px;
      background: var(--bg3);
      transition: background .2s;
    }

    .grid-pip.done { background: var(--gold); }
    .grid-pip.today-cell { outline: 2px solid var(--gold-dim); outline-offset: 1px; }

    /* Score cards */
    .score-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .score-card {
      background: var(--bg2);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .sc-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .sc-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .sc-value.gold { color: var(--gold); }

    .sc-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Best habit */
    .best-habit-card {
      background: var(--bg2);
      border: 1px solid var(--gold-dim);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bh-icon { font-size: 26px; }

    .bh-label {
      font-size: 10px;
      color: var(--gold);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .bh-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }

    .bh-streak { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

    /* Section title */
    .section-title {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Animations */
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .habit-row.just-checked { animation: pop .3s ease; }

    /* ── WEEKLY VIEW ── */
    .weekly-summary {
      background: var(--bg2);
      border: 1px solid var(--gold-dim);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ws-label {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .ws-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .ws-total {
      font-size: 14px;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
    }

    .weekly-list { display: flex; flex-direction: column; gap: 10px; }

    .weekly-item {
      background: var(--bg2);
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid transparent;
      transition: border-color .2s;
    }

    .weekly-item.goal-met { border-color: var(--gold-dim); }

    .wi-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .wi-icon {
      font-size: 20px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg3);
      border-radius: 9px;
      flex-shrink: 0;
    }

    .weekly-item.goal-met .wi-icon { background: var(--gold-glow); }

    .wi-name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .wi-goal {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .04em;
    }

    .wi-goal.met { color: var(--gold); }

    .wi-stepper {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .wi-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--bg3);
      background: var(--bg3);
      color: var(--text);
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
      -webkit-user-select: none;
      user-select: none;
    }

    .wi-btn:active { transform: scale(0.92); background: var(--bg2); }
    .wi-btn:disabled { opacity: .35; cursor: default; }

    .wi-value {
      flex: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      line-height: 1;
    }

    .weekly-item.goal-met .wi-value { color: var(--gold); }

    .wi-barometer {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .wi-bar {
      padding: 10px 0;
      border-radius: 9px;
      border: 1px solid var(--bg3);
      background: var(--bg3);
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
      -webkit-user-select: none;
      user-select: none;
    }

    .wi-bar.selected { color: var(--text); }
    .wi-bar[data-val="red"].selected     { background: rgba(196,107,90,.22);  border-color: var(--red); }
    .wi-bar[data-val="medium"].selected  { background: rgba(201,169,110,.22); border-color: var(--gold-dim); }
    .wi-bar[data-val="high"].selected    { background: rgba(106,158,111,.22); border-color: var(--green); }

    /* ── WEEKLY PROGRESS DASHBOARD ── */
    .wp-axis {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 6px;
      padding: 0 2px;
    }

    .wp-row {
      background: var(--bg2);
      border-radius: 12px;
      padding: 11px 14px;
      margin-bottom: 8px;
    }

    .wp-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .wp-icon { font-size: 14px; }

    .wp-name {
      flex: 1;
      font-size: 12px;
      color: var(--text);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wp-summary {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: .03em;
      white-space: nowrap;
    }

    .wp-summary.strong { color: var(--gold); }

    .wp-strip {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
    }

    .wp-cell {
      height: 18px;
      border-radius: 4px;
      background: var(--bg3);
      transition: background .2s;
    }

    .wp-cell.full      { background: var(--gold); }
    .wp-cell.partial   { background: rgba(201,169,110,.32); border: 1px solid var(--gold-dim); }
    .wp-cell.now       { outline: 1.5px solid var(--gold-dim); outline-offset: 1px; }
    .wp-cell.bar-red    { background: rgba(196,107,90,.75); }
    .wp-cell.bar-medium { background: rgba(201,169,110,.7); }
    .wp-cell.bar-high   { background: rgba(106,158,111,.75); }

    /* ── REMINDER BUTTON ── */
    .reminder-btn {
      margin-top: 18px;
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: 12px;
      padding: 12px;
      color: var(--text-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }

    .reminder-btn:active { background: var(--bg3); }
    .reminder-btn .rb-sub { display: block; font-size: 10px; color: var(--text-dim); margin-top: 3px; letter-spacing: .04em; }

    /* Page transitions */
    .view { display: none; }
    .view.active { display: block; }

    /* ── AUTH GATE ── */
    /* Universal: ensure [hidden] actually hides, regardless of display rules below. */
    [hidden] { display: none !important; }
    .auth-gate { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 32px 24px; max-width: 430px; margin: 0 auto; }
    .auth-card { width: 100%; max-width: 320px; text-align: center; }
    .auth-flame { font-size: 44px; margin-bottom: 14px; opacity: 0.9; }
    .auth-title { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 34px; color: var(--text); margin: 0 0 12px; letter-spacing: -0.01em; }
    .auth-intro { font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text-mid); margin: 0 0 26px; line-height: 1.55; }
    .auth-form { display: none; flex-direction: column; gap: 10px; }
    .auth-form.show { display: flex; }
    .auth-form input { background: var(--bg2); border: 1px solid var(--bg3); border-radius: 12px; padding: 13px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); text-align: center; outline: none; transition: border-color .2s; -webkit-appearance: none; }
    .auth-form input:focus { border-color: var(--gold-dim); }
    .auth-form input::placeholder { color: var(--text-dim); }
    #authCode { letter-spacing: 0.4em; font-variant-numeric: tabular-nums; font-size: 20px; padding: 15px 16px; }
    .auth-form button[type="submit"] { background: var(--gold); color: var(--bg); border: none; border-radius: 12px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; transition: opacity .2s; }
    .auth-form button[type="submit"]:hover:not(:disabled) { opacity: 0.9; }
    .auth-form button[type="submit"]:disabled { opacity: 0.4; cursor: default; }
    .auth-back { background: none; border: none; padding: 6px 0; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-dim); text-decoration: underline; text-decoration-style: dotted; cursor: pointer; margin-top: 4px; }
    .auth-back:hover { color: var(--gold); }
    .auth-status { font-family: 'DM Sans', sans-serif; font-size: 12.5px; color: var(--text-dim); margin-top: 16px; min-height: 1.2em; line-height: 1.5; }
    .auth-status.success { color: var(--gold); }
    .auth-status.error   { color: var(--red); }

    /* SIGN OUT */
    .signout-btn {
      margin-top: 14px;
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: .04em;
    }

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://kdaxubsmszojkdsxjpgs.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Z31hI91ksy8uDB1x-sVP_A_aSuVVaF0';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    // App uses code entry exclusively; disable URL-hash auto-detect to prevent
    // double-verify (which consumes the token before code submission and breaks
    // the flow when both magic link + code are processed).
    detectSessionInUrl: false,
    persistSession: true,
    autoRefreshToken: true,
  },
});

const HABITS = [
  { id:'sleep',       name:'Sleep',       icon:'🌙' },
  { id:'sunlight',    name:'Sunlight',    icon:'☀️' },
  { id:'workout',     name:'Workout',     icon:'🏋️' },
  { id:'vitamins',    name:'Vitamins',    icon:'💊' },
  { id:'sauna',       name:'Sauna',       icon:'🧖' },
  { id:'mindfulness', name:'Mindfulness', icon:'🧘' },
  { id:'nutrition',   name:'Nutrition',   icon:'🥗' },
  { id:'reading',     name:'Reading',     icon:'📖' },
];

const WEEKLY_ITEMS = [
  { id:'groups',     name:'Friend Groups Seen',      icon:'👥', type:'number',    goal:2, unit:'groups' },
  { id:'dates',      name:'Dates',                   icon:'💝', type:'number',    goal:1, unit:'dates' },
  { id:'ldFt',       name:'LD Friendships FT',       icon:'📞', type:'number',    goal:1, unit:'calls' },
  { id:'workExec',   name:'Work Execution',          icon:'💼', type:'barometer', options:['red','medium','high'] },
  { id:'lfArticles', name:'NSP — LF Articles',       icon:'📰', type:'number',    goal:2, unit:'articles' },
  { id:'contacted',  name:'NSP — People Contacted',  icon:'🤝', type:'number',    goal:2, unit:'people' },
];

// ── STATE (in-memory cache; source of truth = Supabase) ─────────
let session = null;
let store = {};         // { 'YYYY-MM-DD': { done:[habitId,...], note:'' } }
let weeklyStore = {};   // { 'YYYY-W##': { metricId: value, ... } }
let noteSaveTimer = null;

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDayData(key) {
  return store[key] || { done: [], note: '' };
}

async function loadAll() {
  if (!session) return;
  const since = new Date();
  since.setDate(since.getDate() - 120);
  const sinceKey = `${since.getFullYear()}-${String(since.getMonth()+1).padStart(2,'0')}-${String(since.getDate()).padStart(2,'0')}`;

  const [checksRes, notesRes, metricsRes] = await Promise.all([
    supabase.from('habit_daily_checks').select('check_date, habit_id').gte('check_date', sinceKey),
    supabase.from('habit_daily_notes').select('check_date, note').gte('check_date', sinceKey),
    supabase.from('habit_weekly_metrics').select('week_iso, metric_id, value_num, value_text')
  ]);
  if (checksRes.error)  console.error('checks load:', checksRes.error);
  if (notesRes.error)   console.error('notes load:', notesRes.error);
  if (metricsRes.error) console.error('metrics load:', metricsRes.error);

  store = {};
  (checksRes.data || []).forEach(r => {
    if (!store[r.check_date]) store[r.check_date] = { done: [], note: '' };
    store[r.check_date].done.push(r.habit_id);
  });
  (notesRes.data || []).forEach(r => {
    if (!store[r.check_date]) store[r.check_date] = { done: [], note: '' };
    store[r.check_date].note = r.note || '';
  });

  weeklyStore = {};
  (metricsRes.data || []).forEach(r => {
    if (!weeklyStore[r.week_iso]) weeklyStore[r.week_iso] = {};
    weeklyStore[r.week_iso][r.metric_id] = r.value_num !== null ? r.value_num : r.value_text;
  });
}

async function toggleHabit(habitId) {
  if (!session) return;
  const key = todayKey();
  if (!store[key]) store[key] = { done: [], note: '' };
  const idx = store[key].done.indexOf(habitId);
  const adding = idx === -1;
  if (adding) store[key].done.push(habitId);
  else store[key].done.splice(idx, 1);

  if (adding) {
    const { error } = await supabase.from('habit_daily_checks').insert({
      user_id: session.user.id, check_date: key, habit_id: habitId
    });
    if (error) console.error('toggleHabit insert:', error);
  } else {
    const { error } = await supabase.from('habit_daily_checks').delete()
      .eq('user_id', session.user.id).eq('check_date', key).eq('habit_id', habitId);
    if (error) console.error('toggleHabit delete:', error);
  }
}

async function saveNoteDebounced(key, text) {
  if (!store[key]) store[key] = { done: [], note: '' };
  store[key].note = text;
  clearTimeout(noteSaveTimer);
  noteSaveTimer = setTimeout(async () => {
    if (!session) return;
    if (text) {
      const { error } = await supabase.from('habit_daily_notes')
        .upsert({ user_id: session.user.id, check_date: key, note: text });
      if (error) console.error('saveNote upsert:', error);
    } else {
      const { error } = await supabase.from('habit_daily_notes').delete()
        .eq('user_id', session.user.id).eq('check_date', key);
      if (error) console.error('saveNote delete:', error);
    }
  }, 500);
}

// ── STREAK CALCULATION ──────────────────────────────────
function calcStreak() {
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const day = store[key];
    if (!day || day.done.length === 0) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function calcHabitStreak(habitId) {
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const day = store[key];
    if (!day || !day.done.includes(habitId)) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

// ── TODAY RENDER ─────────────────────────────────────────
function renderToday() {
  const key = todayKey();
  const day = getDayData(key);
  const total = HABITS.length;
  const done = day.done.length;
  const pct = Math.round((done / total) * 100);
  const circumference = 2 * Math.PI * 26; // ≈163.4

  // Ring
  const arc = document.getElementById('ringArc');
  const offset = circumference - (done / total) * circumference;
  arc.style.strokeDashoffset = offset;
  document.getElementById('ringPct').textContent = pct + '%';
  document.getElementById('fractionText').innerHTML = `${done} <span>/ ${total}</span>`;

  const msgs = ['Let\'s go!','Keep going!','Halfway there!','Almost done!','Incredible! 🏆'];
  const mi = done === total ? 4 : done >= 7 ? 3 : done >= 5 ? 2 : done >= 3 ? 1 : 0;
  document.getElementById('pctText').textContent = msgs[mi];

  document.getElementById('streakCount').textContent = calcStreak();

  // Habits
  const list = document.getElementById('habitsList');
  list.innerHTML = '';
  HABITS.forEach(h => {
    const isDone = day.done.includes(h.id);
    const streak = calcHabitStreak(h.id);
    const row = document.createElement('div');
    row.className = 'habit-row' + (isDone ? ' done' : '');
    row.innerHTML = `
      <div class="habit-icon">${h.icon}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-streak-label ${streak > 1 ? 'active' : ''}">
          ${streak > 1 ? `🔥 ${streak} day streak` : 'Start your streak'}
        </div>
      </div>
      <div class="check-box">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5l3.5 3.5L11 1" stroke="#0f0f0e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    `;
    row.addEventListener('click', () => {
      toggleHabit(h.id);
      row.classList.add('just-checked');
      setTimeout(() => row.classList.remove('just-checked'), 300);
      renderToday();
    });
    list.appendChild(row);
  });

  // Notes
  const ni = document.getElementById('notesInput');
  ni.value = day.note || '';
  ni.oninput = () => saveNoteDebounced(key, ni.value);
}

// ── WEEK VIEW ─────────────────────────────────────────────
let weekOffset = 0; // 0 = current week

function getWeekDates(offset) {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isTodayDate(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

function renderWeek() {
  const days = getWeekDates(weekOffset);
  const todayStr = todayKey();
  const DAY_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Week label
  const start = days[0], end = days[6];
  document.getElementById('weekLabel').textContent =
    `${MONTHS[start.getMonth()]} ${start.getDate()} – ${MONTHS[end.getMonth()]} ${end.getDate()}`;

  // Score
  let totalDone = 0, totalPossible = 0;
  days.forEach(d => {
    const key = dateKey(d);
    const day = store[key];
    if (day) {
      totalDone += day.done.length;
      totalPossible += HABITS.length;
    } else if (d <= new Date()) {
      totalPossible += HABITS.length;
    }
  });
  document.getElementById('weekScore').textContent = totalDone;
  document.getElementById('weekPct').textContent =
    totalPossible > 0 ? Math.round((totalDone/totalPossible)*100) + '%' : '—';

  // Best streak
  let bestStreak = 0, bestHabit = null;
  HABITS.forEach(h => {
    const s = calcHabitStreak(h.id);
    if (s > bestStreak) { bestStreak = s; bestHabit = h; }
  });
  if (bestHabit) {
    document.getElementById('bhIcon').textContent = bestHabit.icon;
    document.getElementById('bhName').textContent = bestHabit.name;
    document.getElementById('bhStreak').textContent = `${bestStreak} day streak`;
  }

  // Summary dots
  const sumEl = document.getElementById('weekSummary');
  sumEl.innerHTML = '';
  days.forEach((d, i) => {
    const key = dateKey(d);
    const day = store[key];
    const cnt = day ? day.done.length : 0;
    const isToday = isTodayDate(d);
    const fillH = cnt > 0 ? Math.round((cnt / HABITS.length) * 28) : 0;
    const perfect = cnt === HABITS.length;
    const col = document.createElement('div');
    col.className = 'day-col';
    col.innerHTML = `
      <div class="day-label ${isToday ? 'today' : ''}">${DAY_LABELS[i]}</div>
      <div class="day-dot ${perfect ? 'perfect' : ''}">
        <div class="fill" style="height:${fillH}px"></div>
        <span>${cnt}</span>
      </div>
    `;
    sumEl.appendChild(col);
  });

  // Grid header
  const ghEl = document.getElementById('gridHeader');
  ghEl.innerHTML = '<div class="gh-cell"></div>' +
    days.map((d,i) => `<div class="gh-cell ${isTodayDate(d)?'today':''}">${DAY_LABELS[i]}</div>`).join('');

  // Habit grid
  const gridEl = document.getElementById('habitGrid');
  gridEl.innerHTML = '';
  HABITS.forEach(h => {
    const row = document.createElement('div');
    row.className = 'habit-grid-row';
    let cells = `<div class="habit-grid-name"><span class="ico">${h.icon}</span>${h.name}</div>`;
    days.forEach(d => {
      const key = dateKey(d);
      const day = store[key];
      const done = day && day.done.includes(h.id);
      const isToday = isTodayDate(d);
      cells += `<div class="grid-cell"><div class="grid-pip ${done?'done':''} ${isToday?'today-cell':''}"></div></div>`;
    });
    row.innerHTML = cells;
    gridEl.appendChild(row);
  });
}

// ── WEEKLY TRACKER ────────────────────────────────────────
let weeklyOffset = 0; // 0 = current ISO week

function getISOWeekKey(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

function getWeeklyData(key) {
  return weeklyStore[key] || {};
}

async function saveWeeklyValue(weekKey, itemId, value) {
  if (!session) return;
  if (!weeklyStore[weekKey]) weeklyStore[weekKey] = {};
  const item = WEEKLY_ITEMS.find(i => i.id === itemId);
  if (value === null || value === undefined) {
    delete weeklyStore[weekKey][itemId];
    const { error } = await supabase.from('habit_weekly_metrics').delete()
      .eq('user_id', session.user.id).eq('week_iso', weekKey).eq('metric_id', itemId);
    if (error) console.error('saveWeeklyValue delete:', error);
  } else {
    weeklyStore[weekKey][itemId] = value;
    const row = {
      user_id: session.user.id,
      week_iso: weekKey,
      metric_id: itemId,
      value_num: item && item.type === 'number' ? value : null,
      value_text: item && item.type === 'barometer' ? value : null
    };
    const { error } = await supabase.from('habit_weekly_metrics').upsert(row);
    if (error) console.error('saveWeeklyValue upsert:', error);
  }
}

function weeklyWeekStart(offset) {
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}

function isGoalMet(item, value) {
  if (item.type === 'number') return (value || 0) >= item.goal;
  if (item.type === 'barometer') return value === 'high';
  return false;
}

function renderWeekly() {
  const monday = weeklyWeekStart(weeklyOffset);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const weekKey = getISOWeekKey(monday);
  const data = getWeeklyData(weekKey);
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  document.getElementById('weeklyWeekLabel').textContent =
    `${MONTHS[monday.getMonth()]} ${monday.getDate()} – ${MONTHS[sunday.getMonth()]} ${sunday.getDate()}`;

  // Disable next button if we're on current week
  document.getElementById('nextWeeklyWeek').disabled = weeklyOffset >= 0;

  // Goals met
  let met = 0;
  const trackableGoals = WEEKLY_ITEMS.filter(it => it.type === 'number').length;
  WEEKLY_ITEMS.forEach(it => { if (isGoalMet(it, data[it.id])) met++; });
  document.getElementById('weeklyGoalsMet').textContent = met;
  document.getElementById('weeklyGoalsTotal').textContent = trackableGoals;

  const list = document.getElementById('weeklyList');
  list.innerHTML = '';

  WEEKLY_ITEMS.forEach(item => {
    const value = data[item.id];
    const met = isGoalMet(item, value);
    const card = document.createElement('div');
    card.className = 'weekly-item' + (met ? ' goal-met' : '');

    if (item.type === 'number') {
      const cur = value || 0;
      card.innerHTML = `
        <div class="wi-header">
          <div class="wi-icon">${item.icon}</div>
          <div class="wi-name">${item.name}</div>
          <div class="wi-goal ${met ? 'met' : ''}">${met ? '✓ ' : ''}goal: ${item.goal}</div>
        </div>
        <div class="wi-stepper">
          <button class="wi-btn wi-minus" ${cur <= 0 ? 'disabled' : ''}>−</button>
          <div class="wi-value">${cur}</div>
          <button class="wi-btn wi-plus">+</button>
        </div>
      `;
      card.querySelector('.wi-plus').addEventListener('click', () => {
        saveWeeklyValue(weekKey, item.id, cur + 1);
        renderWeekly();
      });
      card.querySelector('.wi-minus').addEventListener('click', () => {
        if (cur > 0) {
          saveWeeklyValue(weekKey, item.id, cur - 1);
          renderWeekly();
        }
      });
    } else if (item.type === 'barometer') {
      card.innerHTML = `
        <div class="wi-header">
          <div class="wi-icon">${item.icon}</div>
          <div class="wi-name">${item.name}</div>
          <div class="wi-goal">gut check</div>
        </div>
        <div class="wi-barometer">
          ${item.options.map(opt => `
            <button class="wi-bar ${value === opt ? 'selected' : ''}" data-val="${opt}">${opt}</button>
          `).join('')}
        </div>
      `;
      card.querySelectorAll('.wi-bar').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = btn.dataset.val;
          saveWeeklyValue(weekKey, item.id, value === val ? null : val);
          renderWeekly();
        });
      });
    }

    list.appendChild(card);
  });

  renderWeeklyProgress();
}

function renderWeeklyProgress() {
  const N = 8;
  const store = weeklyStore;
  const weeks = [];
  for (let i = N - 1; i >= 0; i--) {
    const monday = weeklyWeekStart(-i);
    weeks.push({ key: getISOWeekKey(monday), isNow: i === 0 });
  }

  const wrap = document.getElementById('weeklyProgress');
  wrap.innerHTML = '';

  WEEKLY_ITEMS.forEach(item => {
    let metCount = 0;
    const cells = weeks.map(w => {
      const val = (store[w.key] || {})[item.id];
      const met = isGoalMet(item, val);
      if (met) metCount++;
      let cls = 'wp-cell';
      if (item.type === 'number') {
        if (met) cls += ' full';
        else if (val && val > 0) cls += ' partial';
      } else if (item.type === 'barometer') {
        if (val) cls += ' bar-' + val;
      }
      if (w.isNow) cls += ' now';
      const tip = `${w.key}: ${val == null ? '—' : val}`;
      return `<div class="${cls}" title="${tip}"></div>`;
    }).join('');

    const summary = item.type === 'number'
      ? `${metCount}/${N} weeks met`
      : `${metCount}/${N} strong weeks`;
    const summaryCls = metCount >= Math.ceil(N * 0.6) ? ' strong' : '';

    const row = document.createElement('div');
    row.className = 'wp-row';
    row.innerHTML = `
      <div class="wp-header">
        <span class="wp-icon">${item.icon}</span>
        <span class="wp-name">${item.name}</span>
        <span class="wp-summary${summaryCls}">${summary}</span>
      </div>
      <div class="wp-strip">${cells}</div>
    `;
    wrap.appendChild(row);
  });
}

// ── PHONE REMINDERS (.ics) ────────────────────────────────
function downloadReminders() {
  const pad = n => String(n).padStart(2, '0');
  const now = new Date();

  // Daily 8pm: today at 8pm if before 8pm, otherwise tomorrow
  const daily = new Date(now);
  daily.setHours(20, 0, 0, 0);
  if (daily <= now) daily.setDate(daily.getDate() + 1);

  // Next Sunday 10am (Sunday counts as upcoming if today is Sunday before 10am)
  const sunday = new Date(now);
  sunday.setHours(10, 0, 0, 0);
  const dow = sunday.getDay();
  if (dow !== 0 || sunday <= now) {
    const days = dow === 0 ? 7 : (7 - dow);
    sunday.setDate(sunday.getDate() + days);
  }

  const fmt = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  const dailyEnd = new Date(daily.getTime() + 15*60000);
  const sundayEnd = new Date(sunday.getTime() + 15*60000);
  const stamp = Date.now();

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Daily Habits//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:habits-daily-${stamp}@local`,
    `DTSTAMP:${fmt(now)}`,
    `DTSTART:${fmt(daily)}`,
    `DTEND:${fmt(dailyEnd)}`,
    'RRULE:FREQ=DAILY',
    'SUMMARY:Daily habit check-in',
    'DESCRIPTION:Open Daily Habits and check off today\'s habits.',
    'BEGIN:VALARM',
    'ACTION:DISPLAY',
    'DESCRIPTION:Habit check-in',
    'TRIGGER:-PT0M',
    'END:VALARM',
    'END:VEVENT',
    'BEGIN:VEVENT',
    `UID:habits-weekly-${stamp}@local`,
    `DTSTAMP:${fmt(now)}`,
    `DTSTART:${fmt(sunday)}`,
    `DTEND:${fmt(sundayEnd)}`,
    'RRULE:FREQ=WEEKLY;BYDAY=SU',
    'SUMMARY:Weekly tracker check-in',
    'DESCRIPTION:Fill out this week\'s totals in Daily Habits.',
    'BEGIN:VALARM',
    'ACTION:DISPLAY',
    'DESCRIPTION:Weekly tracker',
    'TRIGGER:-PT0M',
    'END:VALARM',
    'END:VEVENT',
    'END:VCALENDAR',
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'habits-reminders.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── TABS ──────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + tab).classList.add('active');
    const titles = { today: 'Today', week: 'Stats', weekly: 'Weekly' };
    document.getElementById('pageTitle').textContent = titles[tab] || 'Today';
    if (tab === 'week') renderWeek();
    if (tab === 'weekly') renderWeekly();
  });
});

document.getElementById('prevWeek').addEventListener('click', () => { weekOffset--; renderWeek(); });
document.getElementById('nextWeek').addEventListener('click', () => { if (weekOffset < 0) { weekOffset++; renderWeek(); } });
document.getElementById('prevWeeklyWeek').addEventListener('click', () => { weeklyOffset--; renderWeekly(); });
document.getElementById('nextWeeklyWeek').addEventListener('click', () => { if (weeklyOffset < 0) { weeklyOffset++; renderWeekly(); } });

// ── DATE HEADER ───────────────────────────────────────────
function setDateLabel() {
  const d = new Date();
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateLabel').textContent =
    `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}

document.getElementById('reminderBtn').addEventListener('click', downloadReminders);

// ── AUTH ──────────────────────────────────────────────────
const authGate    = document.getElementById('authGate');
const appEl       = document.getElementById('app');
const stepEmail   = document.getElementById('authStepEmail');
const stepCode    = document.getElementById('authStepCode');
const inputEmail  = document.getElementById('authEmail');
const inputCode   = document.getElementById('authCode');
const btnSend     = document.getElementById('authSend');
const btnVerify   = document.getElementById('authVerify');
const btnBack     = document.getElementById('authBack');
const authStatus  = document.getElementById('authStatus');
const signoutBtn  = document.getElementById('signoutBtn');

let pendingEmail = '';

function showGate() { authGate.hidden = false; appEl.hidden = true; }
function showApp()  { authGate.hidden = true;  appEl.hidden = false; }
function showStep(which) {
  stepEmail.classList.toggle('show', which === 'email');
  stepCode.classList.toggle('show',  which === 'code');
}
function setAuthStatus(msg, cls) {
  authStatus.className = 'auth-status' + (cls ? ' ' + cls : '');
  authStatus.textContent = msg || '';
}

stepEmail.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = inputEmail.value.trim();
  if (!email) return;
  btnSend.disabled = true;
  setAuthStatus('Sending code…');
  const { error } = await supabase.auth.signInWithOtp({
    email, options: { shouldCreateUser: true }
  });
  if (error) {
    setAuthStatus(error.message, 'error');
    btnSend.disabled = false;
  } else {
    pendingEmail = email;
    setAuthStatus('Check your email for a sign-in code.', 'success');
    showStep('code');
    btnSend.disabled = false;
    setTimeout(() => inputCode.focus(), 50);
  }
});

stepCode.addEventListener('submit', async (e) => {
  e.preventDefault();
  const token = inputCode.value.trim();
  if (!token || !pendingEmail) return;
  btnVerify.disabled = true;
  setAuthStatus('Verifying…');

  // Guard: if we somehow already have a session (e.g., from a successful prior
  // verify whose UI didn't transition), skip the second call entirely.
  const { data: { session: existing } } = await supabase.auth.getSession();
  if (existing) {
    console.log('[habits-auth] already signed in, skipping verifyOtp');
    session = existing;
    setAuthStatus('Already signed in!', 'success');
    inputCode.value = '';
    showApp();
    try { await migrateLocalStorageIfNeeded(); await loadAll(); renderToday(); }
    catch (err) { console.error('[habits-auth] post-signin load:', err); }
    btnVerify.disabled = false;
    return;
  }

  const { data, error } = await supabase.auth.verifyOtp({
    email: pendingEmail, token, type: 'email'
  });

  if (error) {
    console.error('[habits-auth] verifyOtp error:', error);
    setAuthStatus(error.message, 'error');
    btnVerify.disabled = false;
    return;
  }

  // EXPLICIT transition — don't rely on onAuthStateChange firing reliably.
  console.log('[habits-auth] verifyOtp success, session:', !!data?.session, 'user:', data?.user?.id);
  if (data?.session) {
    session = data.session;
    setAuthStatus('Signed in!', 'success');
    inputCode.value = '';
    showApp();
    try { await migrateLocalStorageIfNeeded(); await loadAll(); renderToday(); }
    catch (err) { console.error('[habits-auth] post-signin load:', err); }
  } else {
    // Shouldn't happen: verify succeeded but no session returned.
    setAuthStatus('Verified but no session. Refresh the page.', 'error');
  }
  btnVerify.disabled = false;
});

btnBack.addEventListener('click', () => {
  pendingEmail = '';
  inputCode.value = '';
  setAuthStatus('');
  showStep('email');
  setTimeout(() => inputEmail.focus(), 50);
});

signoutBtn.addEventListener('click', async () => {
  await supabase.auth.signOut();
  store = {};
  weeklyStore = {};
  showStep('email');
  inputEmail.value = '';
  inputCode.value = '';
  pendingEmail = '';
});

// ── LOCALSTORAGE → SUPABASE MIGRATION (one-time, on first sign-in) ──
async function migrateLocalStorageIfNeeded() {
  if (!session) return;
  if (localStorage.getItem('migrated_to_supabase')) return;

  let localHabits = {}, localWeekly = {};
  try { localHabits = JSON.parse(localStorage.getItem('habits_v2') || '{}'); } catch {}
  try { localWeekly = JSON.parse(localStorage.getItem('weekly_v1') || '{}'); } catch {}

  const hasLocal = Object.keys(localHabits).length > 0 || Object.keys(localWeekly).length > 0;
  if (!hasLocal) { localStorage.setItem('migrated_to_supabase', '1'); return; }

  // Don't overwrite existing Supabase data
  const [{ count: checkCount }, { count: metricCount }] = await Promise.all([
    supabase.from('habit_daily_checks').select('*', { count: 'exact', head: true }),
    supabase.from('habit_weekly_metrics').select('*', { count: 'exact', head: true })
  ]);
  if ((checkCount || 0) > 0 || (metricCount || 0) > 0) {
    localStorage.setItem('migrated_to_supabase', '1');
    return;
  }

  const checks = [], notes = [], metrics = [];
  Object.entries(localHabits).forEach(([date, data]) => {
    (data.done || []).forEach(habit_id => {
      checks.push({ user_id: session.user.id, check_date: date, habit_id });
    });
    if (data.note) {
      notes.push({ user_id: session.user.id, check_date: date, note: data.note });
    }
  });
  Object.entries(localWeekly).forEach(([weekKey, data]) => {
    Object.entries(data).forEach(([metric_id, value]) => {
      const item = WEEKLY_ITEMS.find(i => i.id === metric_id);
      if (!item || value == null) return;
      metrics.push({
        user_id: session.user.id,
        week_iso: weekKey,
        metric_id,
        value_num: item.type === 'number' ? value : null,
        value_text: item.type === 'barometer' ? value : null
      });
    });
  });

  if (checks.length)  { const { error } = await supabase.from('habit_daily_checks').insert(checks);  if (error) console.error('migrate checks:', error); }
  if (notes.length)   { const { error } = await supabase.from('habit_daily_notes').insert(notes);    if (error) console.error('migrate notes:', error); }
  if (metrics.length) { const { error } = await supabase.from('habit_weekly_metrics').insert(metrics); if (error) console.error('migrate metrics:', error); }

  localStorage.setItem('migrated_to_supabase', '1');
  console.log(`Migrated to Supabase: ${checks.length} checks, ${notes.length} notes, ${metrics.length} metrics`);
}

// ── BOOT ──────────────────────────────────────────────────
setDateLabel();

supabase.auth.onAuthStateChange(async (_event, newSession) => {
  session = newSession;
  if (session) {
    showApp();
    await migrateLocalStorageIfNeeded();
    await loadAll();
    renderToday();
  } else {
    showGate();
    showStep('email');
  }
});

const { data: { session: initial } } = await supabase.auth.getSession();
session = initial;
if (session) {
  showApp();
  await migrateLocalStorageIfNeeded();
  await loadAll();
  renderToday();
} else {
  showGate();
  showStep('email');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
